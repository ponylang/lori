name: PR

on:
  pull_request:
    paths:
      - '**'
      - '!**/*.md'
      - '!**/*.yml'
      - '!**/*.yaml'
      - '.github/workflows/pr.yml'

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  packages: read

jobs:
  linux:
    name: Linux
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ponylang/shared-docker-ci-standard-builder-with-libressl-4.2.0:nightly
    steps:
      - uses: actions/checkout@v6.0.2
      - name: config=debug
        run: make ci config=debug ssl=libressl
      - name: config=release
        run: make ci config=release ssl=libressl
      - name: open/close stress test
        run: build/debug/open-close 1000000

  macos:
    name: MacOS
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6.0.2
      - name: install pony tools
        run: bash .ci-scripts/macOS-install-nightly-pony-tools.bash
      - name: configure networking
        run: bash .ci-scripts/macOS-configure-networking.bash
      - name: config=debug
        run: |
          export PATH=/Users/runner/.local/share/ponyup/bin/:$PATH
          make ci config=debug ssl=libressl
      - name: config=release
        run: |
          export PATH=/Users/runner/.local/share/ponyup/bin/:$PATH
          make ci config=release ssl=libressl
      - name: open/close stress test
        run: build/debug/open-close 250000

  windows:
    name: Windows
    runs-on: windows-2025
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Checkout ponyc
        uses: actions/checkout@v6.0.2
        with:
          repository: ponylang/ponyc
          path: ponyc-src
      - name: Tune Windows Networking
        run: .ci-scripts\windows-configure-networking.ps1
      - name: Install corral
        run: .ci-scripts\windows-install-pony-tools.ps1 nightlies
      - name: Install MSYS2 dependencies
        run: |
          function msys() { C:\msys64\usr\bin\bash.exe @('-lc') + @Args }; msys ' '; msys 'pacman --noconfirm -Syuu'; msys 'pacman --noconfirm -Syuu'; msys 'pacman --noconfirm -S --needed base-devel mingw-w64-x86_64-lldb'; msys 'pacman --noconfirm -Scc'
      - name: Build ponyc libs
        run: |
          Push-Location ponyc-src
          .\make.ps1 -Command libs
          Pop-Location
      - name: Build ponyc debug runtime
        run: |
          Push-Location ponyc-src
          .\make.ps1 -Command configure -Config Debug
          .\make.ps1 -Command build -Config Debug
          .\build\debug\ponyc.exe --version
          Pop-Location
      - name: build lori SSL libs
        run: .\make.ps1 -Command libs 2>&1;
      - name: crash reproduction loop (issue #237)
        run: |
          $env:PATH = "$PWD\ponyc-src\build\debug;C:\ponyc\bin;" + $env:PATH;
          for ($i = 1; $i -le 100; $i++) {
            Write-Host "=== Run $i/10 ==="
            .\make.ps1 -Command test -Config Debug 2>&1;
          }
